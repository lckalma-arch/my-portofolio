<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Aplikasi: To-Do List</title>
    <!-- Menggunakan Tailwind CSS agar tampilannya modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4 font-sans">

    <!-- KARTU APLIKASI -->
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 md:p-8">
        
        <!-- Header Aplikasi -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Tugas Hari Ini</h1>
                <p class="text-sm text-gray-500">Kelola jadwal kuliah & project kamu</p>
            </div>
            <div class="bg-indigo-100 text-indigo-600 w-10 h-10 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-list-check text-lg"></i>
            </div>
        </div>

        <!-- Form Input Tugas -->
        <div class="flex gap-2 mb-6">
            <input type="text" id="todoInput" placeholder="Tambah tugas baru... (misal: Belajar Java)" 
                class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 text-sm transition-all" />
            <button onclick="addTodo()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl font-medium text-sm transition-all flex items-center gap-1">
                <i class="fa-solid fa-plus"></i> Tambah
            </button>
        </div>

        <!-- Daftar Tugas (List) -->
        <ul id="todoList" class="space-y-3 max-h-64 overflow-y-auto pr-1">
            <!-- Tugas bawaan sebagai contoh awal -->
            <li class="flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100">
                <span class="text-gray-700 text-sm font-medium">Bahas mockup aplikasi TradeBuddy</span>
                <button onclick="deleteTodo(this)" class="text-red-400 hover:text-red-600 p-1 transition-colors">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </li>
            <li class="flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100">
                <span class="text-gray-700 text-sm font-medium">Latihan Clustering DBSCAN Python</span>
                <button onclick="deleteTodo(this)" class="text-red-400 hover:text-red-600 p-1 transition-colors">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </li>
        </ul>

        <!-- Tombol Kembali ke Portofolio -->
        <div class="mt-8 pt-4 border-t border-gray-100 text-center">
            <a href="index.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors inline-flex items-center gap-1">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Portofolio
            </a>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT APLIKASI -->
    <script>
        // Fungsi Tambah Tugas
        function addTodo() {
            const input = document.getElementById('todoInput');
            const taskText = input.value.trim();

            if (taskText === '') {
                alert('Teks tugas tidak boleh kosong!');
                return;
            }

            const todoList = document.getElementById('todoList');

            // Membuat element li baru secara dinamis (DOM Manipulation)
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100 animate-fade-in";
            li.innerHTML = `
                <span class="text-gray-700 text-sm font-medium">${taskText}</span>
                <button onclick="deleteTodo(this)" class="text-red-400 hover:text-red-600 p-1 transition-colors">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            `;

            // Masukkan ke dalam daftar
            todoList.appendChild(li);
            
            // Kosongkan kembali input text
            input.value = '';
        }

        // Fungsi Hapus Tugas
        function deleteTodo(button) {
            // Menghapus element li (induk dari tombol yang diklik)
            const li = button.parentElement;
            li.remove();
        }
    </script>
</body>
</html>
